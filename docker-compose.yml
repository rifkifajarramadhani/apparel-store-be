volumes:
  db_data:

networks:
  shared:
    name: apparel-store-shared
    external: true
  edge:
    name: edge
    external: true

services:
  server:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: air -c .air.toml
    volumes:
      - .:/app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      REDIS_ADDRESS: redis:6379
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://dev.apparel-store.com}
      APP_STOREFRONT_URL: ${APP_STOREFRONT_URL:-https://dev.apparel-store.com}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://dev.apparel-store.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      # Private network to reach db/redis by service name
      default:
      # Internal network shared with the frontend (SSR calls apparel-store-backend:8080)
      shared:
        aliases:
          - apparel-store-backend
      # Public edge network: Traefik routes /api traffic here
      edge: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      # Only /api on these hosts hits the backend; the longer rule out-prioritizes the frontend catch-all
      - "traefik.http.routers.apparel-api.rule=(Host(`apparel-store.rifkiramadhani.my.id`) || Host(`www.apparel-store.rifkiramadhani.my.id`)) && PathPrefix(`/api`)"
      - traefik.http.routers.apparel-api.entrypoints=websecure
      - traefik.http.routers.apparel-api.tls=true
      - traefik.http.routers.apparel-api.tls.certresolver=letsencrypt
      - traefik.http.services.apparel-api.loadbalancer.server.port=8080

  worker:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: air -c .air.worker.toml
    volumes:
      - .:/app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-database}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  scheduler:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: go run ./cmd/scheduler
    volumes:
      - .:/app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-database}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Production services (profile: prod) ---
  # Run the baked binaries from the GHCR image: no bind mount, no air. These are what
  # deploy on the VPS and get zero-downtime rollouts. db/redis are shared (never rolled);
  # mailpit is dev-only, so prod must point at a real SMTP host via .env.
  server-prod:
    profiles: [prod]
    image: ghcr.io/rifkifajarramadhani/apparel-store-be:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      APP_ENVIRONMENT: production
      DATABASE_HOST: db
      REDIS_ADDRESS: redis:6379
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://apparel-store.rifkiramadhani.my.id}
      APP_STOREFRONT_URL: ${APP_STOREFRONT_URL:-https://apparel-store.rifkiramadhani.my.id}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-https://apparel-store.rifkiramadhani.my.id}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
      # Internal network shared with the frontend (SSR calls apparel-store-backend:8080)
      shared:
        aliases:
          - apparel-store-backend
      # Public edge network: Traefik routes /api traffic here
      edge: {}
    labels:
      - traefik.enable=true
      - traefik.docker.network=edge
      - "traefik.http.routers.apparel-api.rule=(Host(`apparel-store.rifkiramadhani.my.id`) || Host(`www.apparel-store.rifkiramadhani.my.id`)) && PathPrefix(`/api`)"
      - traefik.http.routers.apparel-api.entrypoints=websecure
      - traefik.http.routers.apparel-api.tls=true
      - traefik.http.routers.apparel-api.tls.certresolver=letsencrypt
      - traefik.http.services.apparel-api.loadbalancer.server.port=8080
      # Per-IP edge rate limit: 100 req/s average, burst 200 (complements the app-level auth limiter)
      - traefik.http.middlewares.apparel-api-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.apparel-api-ratelimit.ratelimit.burst=200
      - traefik.http.routers.apparel-api.middlewares=apparel-api-ratelimit
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/live"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 20
    restart: unless-stopped

  worker-prod:
    profiles: [prod]
    image: ghcr.io/rifkifajarramadhani/apparel-store-be:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: ["worker"]
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      APP_ENVIRONMENT: production
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-database}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler-prod:
    profiles: [prod]
    image: ghcr.io/rifkifajarramadhani/apparel-store-be:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: ["scheduler"]
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      APP_ENVIRONMENT: production
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-database}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: mysql
    # No host port: reached internally as "db:3306". To inspect with a GUI, tunnel via SSH.
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: apparel_store
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    # No host port: reached internally as "redis:6379".
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    profiles: [dev]
    image: axllent/mailpit:v1.27.8
    # No host ports: SMTP reached internally as "mailpit:1025". Expose the UI (8025)
    # via Traefik on its own subdomain later if you need it.
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
