volumes:
  db_data:

networks:
  shared:
    name: apparel-store-shared
    external: true

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: air -c .air.toml
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      REDIS_ADDRESS: redis:6379
      APP_PUBLIC_URL: https://dev.apparel-store.com
      APP_STOREFRONT_URL: https://dev.apparel-store.com
      APP_CORS_ORIGINS: https://dev.apparel-store.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
      shared:
        aliases:
          - apparel-store-backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: air -c .air.worker.toml
    volumes:
      - .:/app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-database}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: go run ./cmd/scheduler
    volumes:
      - .:/app
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_HOST: db
      QUEUE_DRIVER: ${QUEUE_DRIVER:-database}
      REDIS_ADDRESS: redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.4
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set in .env}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: apparel_store
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.27.8
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
